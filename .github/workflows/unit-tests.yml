name: Unit Tests

on:
  pull_request:
    branches:
      - main

jobs:
  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true
      - run: go generate github.com/majd/ipatool/...
      - run: go test -v github.com/majd/ipatool/...
